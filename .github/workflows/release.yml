# Builds the mod and publishes a GitHub release (and optionally a Thunderstore release)
# whenever you push a tag like `release-1.0.0`.
#
# One-time setup for the GitHub release:
#   * Settings -> Actions -> General -> Workflow permissions: "Read and write permissions".
#
# To also auto-publish to Thunderstore, additionally set:
#   * Settings -> Secrets and variables -> Actions -> Secrets:
#       THUNDERSTORE_SERVICE_TOKEN  = your Thunderstore service account token (NEVER commit this)
#   * Settings -> Secrets and variables -> Actions -> Variables:
#       THUNDERSTORE_TEAM           = your Thunderstore team name
# If THUNDERSTORE_TEAM is unset, the Thunderstore step is skipped and only the GitHub release runs.

name: Build and Release
on:
  push:
    tags:
      - "release-*.*.*"

# Pinned to the decomp + symbols commits the mod was built against.
env:
  MM_DECOMP_REF: "5607eec18bae68e4cd38ef6d1fa69d7f1d84bfc8"
  SYMS_REF: "a325f8fa5c48c925616bd43685ef14bbabc29537"
  RECOMP_MOD_TOOL_URL: "https://github.com/N64Recomp/N64Recomp/releases/download/mod-tool-release/RecompModTool"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 make jq

      - name: Fetch decomp and symbols
        run: |
          git clone https://github.com/zeldaret/mm mm-decomp
          git -C mm-decomp checkout "$MM_DECOMP_REF"
          git clone https://github.com/Zelda64Recomp/Zelda64RecompSyms Zelda64RecompSyms
          git -C Zelda64RecompSyms checkout "$SYMS_REF"

      - name: Fetch RecompModTool
        run: |
          curl -L -o RecompModTool "$RECOMP_MOD_TOOL_URL"
          chmod +x RecompModTool

      - name: Build mod
        run: |
          make CC=clang-18 LD=ld.lld-18 -j"$(nproc)"
          ./RecompModTool mod.toml build

      - name: Assemble Thunderstore package
        run: python3 tools/make_thunderstore_package.py

      - name: Read Thunderstore manifest
        id: manifest
        run: |
          echo "name=$(jq -r '.name' thunderstore_package/manifest.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version_number' thunderstore_package/manifest.json)" >> "$GITHUB_OUTPUT"
          echo "description=$(jq -r '.description' thunderstore_package/manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.manifest.outputs.name }}
          path: |
            build/*.nrm
            ./*.thunderstore.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.manifest.outputs.version }}
          body_path: thunderstore_package/CHANGELOG.md
          files: |
            build/*.nrm
            ./*.thunderstore.zip
          make_latest: true

      - name: Publish Thunderstore release
        if: ${{ vars.THUNDERSTORE_TEAM != '' }}
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          repo: thunderstore.io
          token: ${{ secrets.THUNDERSTORE_SERVICE_TOKEN }}
          community: zelda-64-recompiled
          namespace: ${{ vars.THUNDERSTORE_TEAM }}
          name: ${{ steps.manifest.outputs.name }}
          description: ${{ steps.manifest.outputs.description }}
          version: ${{ steps.manifest.outputs.version }}
          categories: |
            mods
          file: ./${{ steps.manifest.outputs.name }}.thunderstore.zip
